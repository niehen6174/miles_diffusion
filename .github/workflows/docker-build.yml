name: Docker Build & Push

# Ported from radixark/miles docker-build.yml, reduced to the single cu129 variant.

on:
  workflow_dispatch:
    inputs:
      image_repo:
        description: 'Docker Hub repository to push to'
        required: false
        default: 'rockdu/miles_diffusion'
        type: string
      tag:
        description: 'Image tag (empty = dev-cu129-sglang-main-<YYYYMMDD>)'
        required: false
        default: ''
        type: string
      update_latest:
        description: 'Also move the latest tag'
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - 'docker/Dockerfile'
      - 'requirements.txt'

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_REPO: ${{ inputs.image_repo || 'rockdu/miles_diffusion' }}
          IMAGE_TAG: ${{ inputs.tag }}
          UPDATE_LATEST: ${{ github.event_name == 'push' || inputs.update_latest }}
        run: |
          [ -z "${IMAGE_TAG}" ] && IMAGE_TAG="dev-cu129-sglang-main-$(date +%Y%m%d)"
          # --no-cache --pull: the Dockerfile fetches branch tips, so cached layers would pin stale sources.
          docker build --no-cache --pull -f docker/Dockerfile . -t "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          if [ "${UPDATE_LATEST}" = "true" ]; then
            docker tag "${IMAGE_REPO}:${IMAGE_TAG}" "${IMAGE_REPO}:latest"
            docker push "${IMAGE_REPO}:latest"
          fi
