name: PR Test

# Ported from radixark/miles (.github/workflows/pr-test.yml).
#
# Differences vs miles main:
#   * GPU stages run on the dedicated miles-D CI node (8×H200,
#     node-radixark-32-0000) split into (h200,3gpu) + (h200,5gpu) runners —
#     stage-b (fast-gpu) and stage-c (e2e) only, no stage-c-8-gpu-h100.
#   * `resolve-ci-image` resolves a `rockdu/miles_diffusion:<tag>`
#     container (default `latest`), overridable via the `ci-image-tag:`
#     PR-body line or the `ci_image_tag` dispatch input.
#   * `ci_megatron_pr` workflow_dispatch input removed — miles-D source has
#     zero `from megatron` imports.
#   * No `schedule` trigger yet (miles main runs a nightly full CI).

on:
  pull_request:
    types: [synchronize, labeled, opened, reopened]
  workflow_dispatch:
    inputs:
      ci_sglang_pr:
        description: 'SGLang branch/commit (default: sglang-miles)'
        required: false
        type: string
        default: 'sglang-miles-diffusion'
      ci_sglang_repo:
        description: 'SGLang repository owner/name (default: Rockdu/sglang)'
        required: false
        type: string
        default: 'Rockdu/sglang'
      ci_image_tag:
        description: 'miles-diffusion Docker image tag (default: latest)'
        required: false
        type: string
        default: 'latest'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# PR labels are passed through to run_suite.py as raw `run-ci-<X>` strings via
# `--labels`. run_suite.py strips the `run-ci-` prefix internally and ignores
# any label that does not start with `run-ci-` (see tests/ci/run_suite.py
# `strip_run_ci_prefix`). For `workflow_dispatch`, no PR labels exist, so the
# `--labels` list collapses to empty; `--match-all-labels` is then added
# unconditionally to bypass the labels predicate inside run_suite.py and run
# every enabled test in the suite.

jobs:
  resolve-ci-image:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    runs-on: ubuntu-latest
    outputs:
      container_image: ${{ steps.resolve.outputs.container_image }}
    steps:
      - name: Resolve CI image
        id: resolve
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          INPUT_CI_IMAGE_TAG: ${{ github.event.inputs.ci_image_tag || '' }}
        run: |
          CI_IMAGE_TAG="${INPUT_CI_IMAGE_TAG}"
          if [ -n "$PR_BODY" ]; then
            PR_CI_IMAGE_TAG=$(echo "$PR_BODY" | grep -m1 -oP '^ci-image-tag:\s+\K\S+' || true)
            [ -z "$CI_IMAGE_TAG" ] && [ -n "$PR_CI_IMAGE_TAG" ] && CI_IMAGE_TAG="$PR_CI_IMAGE_TAG"
          fi
          [ -z "$CI_IMAGE_TAG" ] && CI_IMAGE_TAG="latest"
          if [[ ! "$CI_IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::ci-image-tag must be a Docker tag, not a full image name: $CI_IMAGE_TAG"
            exit 1
          fi
          echo "container_image=rockdu/miles_diffusion:${CI_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved CI image: rockdu/miles_diffusion:${CI_IMAGE_TAG}"

  # Stage A: CPU-only fast tests (always runs on PR)
  stage-a-cpu:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      cpu_runner: true
      execute_command: >-
        python tests/ci/run_suite.py --hw cpu --suite stage-a-cpu
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage B: CPU-only slower bucket (currently empty; reserved for future
  # CPU tests that don't fit stage-a-cpu's fast budget). Always runs on PR.
  # Empty result exits 0 in run_suite.py.
  stage-b-cpu:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      cpu_runner: true
      execute_command: >-
        python tests/ci/run_suite.py --hw cpu --suite stage-b-cpu
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage B GPU: fast-gpu bucket, gates nothing yet but runs on every PR
  # once stage-a-cpu is green (fast-fail: broken imports shouldn't burn GPU
  # runner slots).
  stage-b-3-gpu-h200:
    needs: [resolve-ci-image, stage-a-cpu]
    if: |
      always() && !cancelled() &&
      needs.resolve-ci-image.result == 'success' &&
      needs.stage-a-cpu.result == 'success' &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    uses: ./.github/workflows/_run-ci.yml
    with:
      # Suite names match the runner split: 3gpu (GPUs 0-2) + 5gpu (GPUs 3-7).
      runs_on: '["h200", "3gpu"]'
      container_image: ${{ needs.resolve-ci-image.outputs.container_image }}
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-b-3-gpu-h200
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage C GPU (3gpu runner): e2e suite for the 2-GPU SD3.5 OCR recipe.
  # Shares the 3gpu runner with stage-b, so the two queue rather than run
  # concurrently — acceptable for a 2-rollout smoke e2e.
  stage-c-3-gpu-h200:
    needs: [resolve-ci-image, stage-a-cpu]
    if: |
      always() && !cancelled() &&
      needs.resolve-ci-image.result == 'success' &&
      needs.stage-a-cpu.result == 'success' &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h200", "3gpu"]'
      container_image: ${{ needs.resolve-ci-image.outputs.container_image }}
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-3-gpu-h200
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage C GPU: e2e suite. A 2-gpu e2e runs on the 5gpu runner so it
  # parallelizes with stage-b fast tests on the 3gpu runner.
  stage-c-5-gpu-h200:
    needs: [resolve-ci-image, stage-a-cpu]
    if: |
      always() && !cancelled() &&
      needs.resolve-ci-image.result == 'success' &&
      needs.stage-a-cpu.result == 'success' &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h200", "5gpu"]'
      container_image: ${{ needs.resolve-ci-image.outputs.container_image }}
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-5-gpu-h200
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit
